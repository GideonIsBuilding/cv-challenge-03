name: Infra Validate and Plan

on:
  push:
    branches: [ "infra_features" ]
  pull_request:
    branches: [ "infra_main" ]

jobs:
  terraform-validate:
    if: github.ref == 'refs/heads/infra_features'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.0

      - name: Terrrafrom Init
        run: terraform init
      
      - name: Terraform Validate
        run: terraform validate

  terraform-plan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=plan.out

      - name: InfraCost
        id: infracost
        run: |
          infracost breakdown --path . --format json --out-file infracost.json
          infracost comment github --path infracost.json --behavior update

      - name: Post Terraform Plan and Cost in PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform plan
          message: |
            ```terraform
            ${ { steps.plan.outputs.stdout } }
            ```
            ## Cost Estimation
            ```json
            ${ { steps.infracost.outputs.comment } }
            ```

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
