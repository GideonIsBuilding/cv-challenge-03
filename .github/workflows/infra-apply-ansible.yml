name: Infra Apply and Ansible Deploy

on:
  push:
    branches: [ "infra_main" ]

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Generate Inventory
        run: |
          # Use terraform output to get instance IP and write to Ansible inventory
          PUBLIC_IP=$(terraform output -raw public_ip)
          echo "[app]" > ansible/inventory
          echo "${PUBLIC_IP} ansible_user=ubuntu ansible_ssh_private_key_file=/path/to/key.pem" >> ansible/inventory

  ansible-deploy-monitoring:
    needs: terraform-apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Deploy Monitoring with Ansible
        run: ansible-playbook -i ansible/inventory ansible/playbook.yml --tags "monitoring"
